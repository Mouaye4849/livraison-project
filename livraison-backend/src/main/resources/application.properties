# ── Bankily auth diagnostic logging ──────────────────────────────────────────
logging.level.com.livraison.backend.auth.BankilyAuthService=INFO

# ── GPS / WebSocket diagnostic logging ───────────────────────────────────────
logging.level.com.livraison.backend.config.WebSocketConfig=DEBUG
logging.level.com.livraison.backend.controller.GpsWsController=DEBUG
logging.level.com.livraison.backend.service.GpsWsService=DEBUG
logging.level.com.livraison.backend.service.GpsServiceImpl=DEBUG

# ── Log file — all GPS/WS output written here for offline inspection ─────────
logging.file.name=logs/wasali-backend.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=3
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ── Email / OTP ───────────────────────────────────────────────────────────────
# Use a Gmail App Password (not your normal password).
# Create one at: https://myaccount.google.com/apppasswords
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true